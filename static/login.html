<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    p { opacity: 0.6; font-size: 0.95rem; }
  </style>
</head>
<body>
  <p id="msg">お待ちください…</p>
  <script>
    // 未認証時にサーバーが返す門番ページ。アプリ本体のUIは一切含まない。
    // 役割: (1) Cognitoへのリダイレクト(PKCE) (2) コールバック(?code=)のトークン交換
    (async () => {
      const msg = document.getElementById('msg');
      // 状態に応じてメッセージを出し分ける
      // (ログイン処理中 / ログアウト直後 / これからログイン画面へ、は全部別物)
      const isCallback = new URLSearchParams(location.search).has('code');
      const loggingOut = sessionStorage.getItem('logging_out') === '1';
      sessionStorage.removeItem('logging_out');
      msg.textContent = isCallback
        ? 'ログインしています…'
        : loggingOut
          ? 'ログアウトしました。ログイン画面へ移動しています…'
          : 'ログイン画面へ移動しています…';
      const b64url = (bytes) => btoa(String.fromCharCode(...bytes))
        .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');

      let cfg;
      try {
        cfg = await (await fetch('/api/auth/config')).json();
      } catch (_) {
        msg.textContent = '設定の取得に失敗しました。ページを再読み込みしてください。';
        return;
      }
      if (!cfg.enabled) { location.replace('/'); return; }

      // Cognitoからのコールバック: 認可コードをトークンに交換してCookieへ
      const params = new URLSearchParams(location.search);
      if (params.get('code')) {
        const body = new URLSearchParams({
          grant_type: 'authorization_code',
          client_id: cfg.client_id,
          code: params.get('code'),
          redirect_uri: location.origin + '/',
          code_verifier: sessionStorage.getItem('pkce_verifier') || '',
        });
        try {
          const res = await fetch(`${cfg.domain}/oauth2/token`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body,
          });
          if (res.ok) {
            const tok = await res.json();
            document.cookie =
              `id_token=${tok.id_token}; Max-Age=${tok.expires_in}; Path=/; SameSite=Lax`;
            // Cookieが実際に保存できたか確認(ブロックされているとここで
            // 検知しない限り、ログイン画面との無限ループになる)
            if (!document.cookie.includes('id_token=')) {
              msg.textContent =
                'Cookieを保存できないためログインできません。ブラウザのCookie設定を確認してください。';
              return;
            }
            location.replace('/');
            return;
          }
          console.error('token exchange failed:', res.status, await res.text());
        } catch (err) {
          console.error('token exchange error:', err);
        }
        // 交換失敗: 表示と挙動を一致させ、連続失敗時は無限ループさせず停止する
        const failures = Number(sessionStorage.getItem('login_failures') || 0) + 1;
        sessionStorage.setItem('login_failures', String(failures));
        if (failures >= 2) {
          msg.textContent =
            'ログインに失敗しました。ページを再読み込みして、やり直してください。';
          return;
        }
        msg.textContent = 'ログインに失敗しました。ログイン画面へ移動します…';
        await new Promise((r) => setTimeout(r, 1500)); // メッセージを読める時間を確保
      }

      // ループガード: ログイン画面への往復回数を数える(アプリが正常に
      // 起動したときだけ app.js がリセットする)。交換の成否に関係なく
      // 数えるので、「交換は成功するがCookieが効かない」型のループも止まる
      const redirects = Number(sessionStorage.getItem('auth_redirects') || 0) + 1;
      sessionStorage.setItem('auth_redirects', String(redirects));
      if (redirects >= 4) {
        msg.textContent =
          'ログイン画面への移動を繰り返しているため中断しました。'
          + 'ブラウザのCookie設定やサーバーのCognito設定を確認し、ページを再読み込みしてください。';
        return;
      }

      // PKCEを準備してCognitoのログイン画面へ
      const bytes = new Uint8Array(32);
      crypto.getRandomValues(bytes);
      const verifier = b64url(bytes);
      sessionStorage.setItem('pkce_verifier', verifier);
      const digest = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(verifier));
      const q = new URLSearchParams({
        client_id: cfg.client_id,
        response_type: 'code',
        scope: 'openid email profile',
        redirect_uri: location.origin + '/',
        code_challenge: b64url(new Uint8Array(digest)),
        code_challenge_method: 'S256',
      });
      location.replace(`${cfg.domain}/oauth2/authorize?${q}`);
    })();
  </script>
</body>
</html>
