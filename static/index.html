<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Push-to-Talk リアルタイム通話</title>
  <style>
    :root {
      color-scheme: light dark;
      --accent: #e5484d;
      --accent-active: #16a34a;
      --border: rgba(128,128,128,0.35);
    }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 640px;
      margin: 0 auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      /* ページ全体は伸ばさず、会話エリアだけを内部スクロールさせる。
         これでPTTボタンは会話が長くなっても常に画面内に固定される */
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      box-sizing: border-box;
    }
    h1 { font-size: 1.2rem; margin: 0; }
    #tabs { display: flex; gap: 8px; }
    .tab {
      flex: 1;
      padding: 10px;
      font-size: 0.95rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: transparent;
      color: inherit;
      cursor: pointer;
    }
    .tab.active { border-color: var(--accent); color: var(--accent); font-weight: 600; }
    #view-call, #view-history {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-height: 0;
    }
    [hidden] { display: none !important; }
    #status {
      font-size: 0.85rem;
      opacity: 0.75;
      min-height: 1.2em;
    }
    #status.error { color: var(--accent); opacity: 1; }
    #transcript, #historyList {
      flex: 1;
      overflow-y: auto;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      font-size: 0.95rem;
      line-height: 1.6;
      min-height: 0; /* flexで縮められるようにしないと内部スクロールが効かない */
      box-sizing: border-box;
    }
    .turn { margin-bottom: 8px; }
    .who { font-weight: 600; opacity: 0.7; font-size: 0.8rem; }
    .hist-session { margin-bottom: 20px; }
    .hist-session h3 {
      font-size: 0.8rem;
      opacity: 0.6;
      margin: 0 0 8px;
      padding-bottom: 4px;
      border-bottom: 1px solid var(--border);
    }
    #ptt {
      font-size: 1.1rem;
      font-weight: 600;
      padding: 22px;
      border-radius: 12px;
      border: none;
      background: var(--accent);
      color: white;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }
    #ptt.talking { background: var(--accent-active); }
    #ptt:disabled { opacity: 0.5; cursor: not-allowed; }
    .hint { font-size: 0.8rem; opacity: 0.6; text-align: center; margin: 0; }
    #controls {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
    }
    #persona {
      flex: 1;
      max-width: 240px;
      padding: 6px 10px;
      font-size: 0.9rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: transparent;
      color: inherit;
    }
    #reloadHistory {
      align-self: flex-end;
      padding: 6px 14px;
      font-size: 0.85rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: transparent;
      color: inherit;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>🎙️ Push-to-Talk リアルタイム通話</h1>
  <div id="tabs">
    <button class="tab active" data-tab="call">🎙️ 通話</button>
    <button class="tab" data-tab="history">📜 履歴</button>
  </div>

  <div id="view-call">
    <div id="controls">
      <label for="persona">ペルソナ:</label>
      <select id="persona"></select>
    </div>
    <div id="status">接続中…</div>
    <div id="transcript"></div>
    <button id="ptt" disabled>押している間だけ話す(またはスペースキー長押し)</button>
    <p class="hint">ボタンを離すとAIが応答します。応答中に押すと割り込めます。</p>
  </div>

  <div id="view-history" hidden>
    <button id="reloadHistory">🔄 更新</button>
    <div id="historyList"></div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
