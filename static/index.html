<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Push-to-Talk リアルタイム通話</title>
  <style>
    :root {
      color-scheme: light dark;
      --accent: #e5484d;
      --accent-active: #16a34a;
    }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 640px;
      margin: 0 auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-height: 100vh;
      box-sizing: border-box;
    }
    h1 { font-size: 1.2rem; margin: 0; }
    #status {
      font-size: 0.85rem;
      opacity: 0.75;
      min-height: 1.2em;
    }
    #status.error { color: var(--accent); opacity: 1; }
    #transcript {
      flex: 1;
      overflow-y: auto;
      border: 1px solid rgba(128,128,128,0.35);
      border-radius: 8px;
      padding: 12px;
      font-size: 0.95rem;
      line-height: 1.6;
      min-height: 200px;
    }
    #transcript .turn { margin-bottom: 8px; }
    #transcript .who { font-weight: 600; opacity: 0.7; font-size: 0.8rem; }
    #ptt {
      font-size: 1.1rem;
      font-weight: 600;
      padding: 22px;
      border-radius: 12px;
      border: none;
      background: var(--accent);
      color: white;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }
    #ptt.talking { background: var(--accent-active); }
    #ptt:disabled { opacity: 0.5; cursor: not-allowed; }
    .hint { font-size: 0.8rem; opacity: 0.6; text-align: center; margin: 0; }
  </style>
</head>
<body>
  <h1>🎙️ Push-to-Talk リアルタイム通話</h1>
  <div id="status">接続中…</div>
  <div id="transcript"></div>
  <button id="ptt" disabled>押している間だけ話す(またはスペースキー長押し)</button>
  <p class="hint">ボタンを離すとAIが応答します。応答中に押すと割り込めます。</p>
  <script src="/static/app.js"></script>
</body>
</html>
