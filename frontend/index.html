<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Push-to-Talk リアルタイム通話</title>
  <style>
    :root {
      color-scheme: light dark;
      --accent: #e5484d;
      --accent-active: #16a34a;
      --border: rgba(128,128,128,0.35);
    }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 640px;
      margin: 0 auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      /* ページ全体は伸ばさず、会話エリアだけを内部スクロールさせる。
         これでPTTボタンは会話が長くなっても常に画面内に固定される */
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      box-sizing: border-box;
    }
    h1 { font-size: 1.2rem; margin: 0; }
    #topbar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    #tabs { display: flex; gap: 8px; }
    .tab {
      flex: 1;
      padding: 10px;
      font-size: 0.95rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: transparent;
      color: inherit;
      cursor: pointer;
    }
    .tab.active { border-color: var(--accent); color: var(--accent); font-weight: 600; }
    #view-call, #view-history {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-height: 0;
    }
    [hidden] { display: none !important; }
    #status {
      font-size: 0.85rem;
      opacity: 0.75;
      min-height: 1.2em;
    }
    #status.error { color: var(--accent); opacity: 1; }
    #transcript, #historyList {
      flex: 1;
      overflow-y: auto;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      font-size: 0.95rem;
      line-height: 1.6;
      min-height: 0; /* flexで縮められるようにしないと内部スクロールが効かない */
      box-sizing: border-box;
    }
    .turn { margin-bottom: 8px; }
    .who { font-weight: 600; opacity: 0.7; font-size: 0.8rem; }
    .hist-session { margin-bottom: 20px; }
    .hist-session h3 {
      font-size: 0.8rem;
      opacity: 0.6;
      margin: 0 0 8px;
      padding-bottom: 4px;
      border-bottom: 1px solid var(--border);
    }
    #ptt {
      font-size: 1.1rem;
      font-weight: 600;
      padding: 22px;
      border-radius: 12px;
      border: none;
      background: var(--accent);
      color: white;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }
    #ptt.talking { background: var(--accent-active); }
    #ptt:disabled { opacity: 0.5; cursor: not-allowed; }
    .hint { font-size: 0.8rem; opacity: 0.6; text-align: center; margin: 0; }
    /* 設定4つは2×2グリッド。ラベルを上に置いてセレクトに幅を全部使わせる
       (横並び+max-widthだと長いマイク名・回線名が見切れる) */
    #controls {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px 12px;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-width: 0; /* グリッドの子が内容幅で膨らんで枠を壊すのを防ぐ */
    }
    .field label { font-size: 0.75rem; opacity: 0.65; }
    #persona, #mic, #transport, #mode {
      width: 100%;
      box-sizing: border-box;
      padding: 6px 10px;
      font-size: 0.9rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: transparent;
      color: inherit;
      cursor: pointer;
      /* 幅に収まらないときは「…」で切れていることを明示(titleで全文が見える) */
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    /* PTTボタン直上の入力レベルインジケーター(音量で緑→黄→赤) */
    #meterWrap {
      height: 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: -8px; /* ボタンに寄せる */
    }
    #meterBar {
      height: 100%;
      width: 0%;
      background: var(--accent-active);
      transition: width 0.06s linear, background-color 0.06s linear;
    }
    #hist-controls {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }
    #histFilter, #reloadHistory {
      padding: 6px 14px;
      font-size: 0.85rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: transparent;
      color: inherit;
      cursor: pointer;
    }
    #userInfo {
      margin-left: auto;
      font-size: 0.8rem;
      opacity: 0.7;
    }
    #logoutBtn {
      padding: 6px 10px;
      font-size: 0.8rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: transparent;
      color: inherit;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <header id="topbar">
    <h1>🎙️ Push-to-Talk リアルタイム通話</h1>
    <span id="userInfo" hidden></span>
    <button id="logoutBtn" hidden>ログアウト</button>
  </header>
  <div id="tabs">
    <button class="tab active" data-tab="call">🎙️ 通話</button>
    <button class="tab" data-tab="history">📜 履歴</button>
  </div>

  <div id="view-call">
    <div id="controls">
      <div class="field">
        <label for="persona">ペルソナ</label>
        <select id="persona"></select>
      </div>
      <div class="field">
        <label for="mic">🎤 マイク</label>
        <select id="mic"><option value="">既定のマイク</option></select>
      </div>
      <div class="field">
        <label for="transport">回線</label>
        <select id="transport">
          <option value="webrtc" selected>WebRTC(直結・高精度)</option>
          <option value="ws">WebSocket(中継・全部見える)</option>
        </select>
      </div>
      <div class="field">
        <label for="mode">モード</label>
        <select id="mode">
          <option value="ptt" selected>押して話す(PTT)</option>
          <option value="vad">ハンズフリー通話(VAD)</option>
        </select>
      </div>
    </div>
    <div id="status">接続中…</div>
    <div id="transcript"></div>
    <div id="meterWrap"><div id="meterBar"></div></div>
    <button id="ptt" disabled>押している間だけ話す(またはスペースキー長押し)</button>
    <p class="hint" id="pttHint">ボタンを離すとAIが応答します。応答中に押すと割り込めます。</p>
  </div>

  <div id="view-history" hidden>
    <div id="hist-controls">
      <select id="histFilter"><option value="">すべてのペルソナ</option></select>
      <button id="reloadHistory">🔄 更新</button>
    </div>
    <div id="historyList"></div>
  </div>

  <!-- WebRTC直結モードのリモート音声再生用(画面には出さない) -->
  <audio id="remoteAudio" autoplay hidden></audio>
  <script src="/static/transport_webrtc.js"></script>
  <script src="/static/transport_ws.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
